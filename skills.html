<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nithin | Skills</title>
  <link rel="stylesheet" href="style.css">
  <!-- Ionicons for modern icons -->
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>

<body>

  <nav class="navbar">
    <ul>
      <li><a href="index.html">HOME</a></li>
      <li><a href="about.html">ABOUT</a></li>
      <li><a href="skills.html" class="active">SKILLS</a></li>
      <li><a href="projects.html">PROJECTS</a></li>
      <li><a href="contact.html">CONTACT</a></li>
    </ul>
  </nav>

  <main class="main">
    <section class="skills-section container">
      <!-- Animated UI Orbs -->
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>

      <h2 class="section-title reveal">My <span class="text-gradient">Skills</span></h2>

      <div class="skills-grid reveal">
        <!-- Skill 1 -->
        <div class="skill-card glass glass-hover">
          <div class="skill-header">
            <h3><ion-icon name="logo-html5" style="color: #ff5722;"></ion-icon> HTML</h3>
            <span>90%</span>
          </div>
          <div class="bar">
            <div class="progress" style="--target-width: 90%; background: #ff5722; box-shadow: 0 0 10px #ff5722;"></div>
          </div>
        </div>

        <!-- Skill 2 -->
        <div class="skill-card glass glass-hover">
          <div class="skill-header">
            <h3><ion-icon name="logo-css3" style="color: #2196f3;"></ion-icon> CSS</h3>
            <span>85%</span>
          </div>
          <div class="bar">
            <div class="progress" style="--target-width: 85%; background: #2196f3; box-shadow: 0 0 10px #2196f3;"></div>
          </div>
        </div>

        <!-- Skill 3 -->
        <div class="skill-card glass glass-hover">
          <div class="skill-header">
            <h3><ion-icon name="logo-javascript" style="color: #ffca28;"></ion-icon> JavaScript</h3>
            <span>75%</span>
          </div>
          <div class="bar">
            <div class="progress" style="--target-width: 75%; background: #ffca28; box-shadow: 0 0 10px #ffca28;"></div>
          </div>
        </div>

        <!-- Skill 4 -->
        <div class="skill-card glass glass-hover">
          <div class="skill-header">
            <h3><ion-icon name="logo-python" style="color: #4caf50;"></ion-icon> Python</h3>
            <span>60%</span>
          </div>
          <div class="bar">
            <div class="progress" style="--target-width: 60%; background: #4caf50; box-shadow: 0 0 10px #4caf50;"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>

</html>
